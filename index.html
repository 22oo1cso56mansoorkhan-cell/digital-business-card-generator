<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Business Card Generator</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- html2canvas for image download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>
        <i class="fas fa-id-card" style="color: #1f6c8c;"></i> Digital Card
        <small>generator</small>
      </h1>
      <div class="subhead">Fill in your details &amp; choose a template</div>
    </header>

    <div class="generator-grid">
      <!-- FORM -->
      <div class="form-panel">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Full name</label>
          <input type="text" id="nameInput" value="Alex Rivera" placeholder="e.g. Alex Rivera" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-briefcase"></i> Job title</label>
          <input type="text" id="titleInput" value="Creative Director" placeholder="e.g. Creative Director" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-image"></i> Profile image</label>
          <div class="image-upload">
            <input type="file" id="imageUpload" accept="image/*" />
            <span style="font-size:0.8rem; color:#2d6a82;">(optional)</span>
          </div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-link"></i> Social links</label>
          <div class="social-row"><i class="fab fa-github"></i><input type="text" id="githubInput" value="https://github.com/alexr" placeholder="GitHub URL" /></div>
          <div class="social-row"><i class="fab fa-linkedin"></i><input type="text" id="linkedinInput" value="https://linkedin.com/in/alexr" placeholder="LinkedIn URL" /></div>
          <div class="social-row"><i class="fab fa-twitter"></i><input type="text" id="twitterInput" value="https://twitter.com/alexr" placeholder="Twitter / X" /></div>
          <div class="social-row"><i class="fas fa-globe"></i><input type="text" id="websiteInput" value="https://alex.design" placeholder="Website" /></div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-palette"></i> Template</label>
          <div class="template-selector">
            <button class="template-btn active" data-template="modern">Modern</button>
            <button class="template-btn" data-template="classic">Classic</button>
            <button class="template-btn" data-template="dark">Dark</button>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-primary" id="generateBtn"><i class="fas fa-sync-alt"></i> Update card</button>
          <button class="btn btn-outline" id="downloadPngBtn"><i class="fas fa-download"></i> PNG</button>
          <button class="btn btn-outline" id="downloadPdfBtn"><i class="fas fa-file-pdf"></i> PDF</button>
        </div>
        <p style="margin-top: 1rem; font-size:0.8rem; color:#3b738d;"><i class="fas fa-info-circle"></i> PDF &amp; PNG download the card preview.</p>
      </div>

      <!-- PREVIEW -->
      <div class="preview-panel">
        <div class="card-wrapper" id="cardWrapper">
          <div id="cardPreview" class="template-modern">
            <div class="card-header">
              <div class="card-avatar card-avatar-placeholder" id="avatarPreview"><i class="fas fa-user" style="font-size:2rem;"></i></div>
              <div>
                <div class="card-name" id="cardName">Alex Rivera</div>
                <div class="card-title" id="cardTitle">Creative Director</div>
              </div>
            </div>
            <div class="card-divider"></div>
            <div class="card-social" id="cardSocial"></div>
            <div class="card-footer">✦ digital business card</div>
          </div>
        </div>
        <div class="download-hint"><i class="fas fa-arrow-up"></i> preview updates live</div>
      </div>
    </div>
  </div>

  <!-- External JavaScript -->
  <script src="script.js"></script>
</body>
</html>
